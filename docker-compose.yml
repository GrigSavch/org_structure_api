version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: org_structure_db
    environment:
      POSTGRES_DB: org_structure
      POSTGRES_USER: org_user
      POSTGRES_PASSWORD: org_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U org_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: org_structure_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DB_HOST=db
      - DB_NAME=org_structure
      - DB_USER=org_user
      - DB_PASSWORD=org_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: