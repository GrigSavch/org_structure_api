[tool.ruff]
line-length = 79
target-version = "py311"

exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
    "env",
    ".env",
    "build",
    "dist",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "Q"]
ignore = ["E203"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint.isort]
known-first-party = ["eco_script"]


[tool.isort]
profile = "black"
line_length = 79
skip = [
    "venv",
    ".venv",
    "env",
    ".env",
    "build",
    "dist",
]